<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smotret - Refugio 💛</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}

.msg{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  text-align:center;
  opacity:0;
  transition:1s;
  pointer-events:none;
  text-shadow:0 0 40px #ffd27f;
}

#msg1{top:12%;font-size:26px;}
#msg2{top:20%;font-size:32px;}
#msg3{
  top:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  font-weight:700;
}

#meteorMsg{
  top:70%;
  font-size:38px;
  font-weight:700;
}

.show{opacity:1;}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<audio id="bgMusic" loop preload="auto">
  <source src="musica.mp3" type="audio/mpeg">
  <source src="musica.ogg" type="audio/ogg">
</audio>

<canvas id="c"></canvas>

<div id="msg1" class="msg">Sonríe… tus ojos merecen brillar ✨</div>
<div id="msg2" class="msg">¿Si sonreiste?</div>
<div id="msg3" class="msg">No tienes que poder con todo hoy</div>
<div id="meteorMsg" class="msg">Todo estará bien 💛</div>

<script>

// 🎵 MÚSICA UNIVERSAL AL PRIMERA INTERACCIÓN (FIX MÓVIL)

const music = document.getElementById("bgMusic");

function startMusic() {

  if (!music.paused) return;

  const p = music.play();

  if (p !== undefined) {
    p.then(() => {

      music.volume = 0;

      let v = 0;
      const fade = setInterval(() => {
        v += 0.01;
        music.volume = Math.min(v, 0.4);
        if (v >= 0.4) clearInterval(fade);
      }, 100);

    }).catch(()=>{});
  }

  window.removeEventListener("click", startMusic);
  window.removeEventListener("touchstart", startMusic);
  window.removeEventListener("keydown", startMusic);
}

window.addEventListener("touchstart", startMusic, { passive: true });
window.addEventListener("click", startMusic);
window.addEventListener("keydown", startMusic);

// ===== RENDER =====
const renderer=new THREE.WebGLRenderer({canvas:c,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);

const scene=new THREE.Scene();

// ===== CAMARA =====
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,20000);
camera.position.set(0,700,2600);

// ===== CONTROLES =====
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.minDistance=250;
controls.maxDistance=7000;

// ===== FONDO =====
const loader=new THREE.TextureLoader();
const sky=new THREE.Mesh(
  new THREE.SphereGeometry(9000,64,64),
  new THREE.MeshBasicMaterial({
    map:loader.load("https://upload.wikimedia.org/wikipedia/commons/9/99/Milky_Way_Galaxy.jpg"),
    side:THREE.BackSide
  })
);
scene.add(sky);

// ===== ESTRELLAS =====
const starsGeo=new THREE.BufferGeometry();
const starCount=9000;
const pos=new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
  pos[i*3]=(Math.random()-0.5)*15000;
  pos[i*3+1]=(Math.random()-0.5)*6000;
  pos[i*3+2]=(Math.random()-0.5)*15000;
}
starsGeo.setAttribute("position",new THREE.BufferAttribute(pos,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({size:3})));

// ===== PLANETA =====
const planetGroup=new THREE.Group();
scene.add(planetGroup);

const planet=new THREE.Mesh(
  new THREE.SphereGeometry(240,64,64),
  new THREE.MeshStandardMaterial({
    map:loader.load("https://threejs.org/examples/textures/planets/saturn.jpg")
  })
);
planetGroup.add(planet);

const ring=new THREE.Mesh(
  new THREE.RingGeometry(310,520,128),
  new THREE.MeshStandardMaterial({
    color:0xffd27f,
    side:THREE.DoubleSide,
    transparent:true,
    opacity:0.8
  })
);
ring.rotation.x=-Math.PI/2.2;
planetGroup.add(ring);

// ===== AURA =====
const aura=new THREE.Sprite(
  new THREE.SpriteMaterial({
    map:loader.load("https://threejs.org/examples/textures/lensflare/lensflare0.png"),
    color:0xffd27f,
    transparent:true,
    opacity:0.5,
    blending:THREE.AdditiveBlending
  })
);
aura.scale.set(1300,1300,1);
planetGroup.add(aura);

// ===== PALABRAS =====
const phrases=[
"Sigue aquí",
"Respira despacio",
"No tienes que poder con todo",
"Aquí puedes descansar",
"Todo puede esperar",
"Te recuperarás",
"Aún hay luz",
"Un momento a la vez",
"No estás sola",
"Camila",
"Puedes ir lento",
"Tu presencia basta",
"Lo estás haciendo bien",
"Paladins nos espera",
"Aquí estás a salvo",
"Cuando estés lista",
"Un minuto más",
"Todo estará bien 💛"
];

function textSprite(t){
  const canvas=document.createElement("canvas");
  canvas.width=1024;canvas.height=256;
  const ctx=canvas.getContext("2d");
  ctx.font="bold 70px Arial";
  ctx.fillStyle="white";
  ctx.textAlign="center";
  ctx.shadowBlur=40;
  ctx.shadowColor="#ffd27f";
  ctx.fillText(t,512,150);
  const tex=new THREE.CanvasTexture(canvas);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  s.scale.set(260,90,1);
  return s;
}

const words=new THREE.Group();
scene.add(words);

for(let i=0;i<60;i++){
  const s=textSprite(phrases[i%phrases.length]);
  const r=900+Math.random()*800;
  const a=Math.random()*Math.PI*2;
  const h=(Math.random()-0.5)*500;
  s.position.set(Math.cos(a)*r,h,Math.sin(a)*r);
  words.add(s);
}

// ===== METEOROS =====
const meteors=[];
const particles=[];
const constellations=[];

function spawnMeteor(){

  const group=new THREE.Group();

  const head=new THREE.Mesh(
    new THREE.SphereGeometry(16,24,24),
    new THREE.MeshBasicMaterial({color:0xfff1b8})
  );
  group.add(head);

  const glow=new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:loader.load("https://threejs.org/examples/textures/lensflare/lensflare0.png"),
      color:0xffd27f,
      transparent:true,
      opacity:0.7,
      blending:THREE.AdditiveBlending
    })
  );
  glow.scale.set(120,120,1);
  group.add(glow);

  const tail=new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:loader.load("https://threejs.org/examples/textures/lensflare/lensflare0.png"),
      color:0xffc96b,
      transparent:true,
      opacity:0.45,
      blending:THREE.AdditiveBlending
    })
  );
  tail.scale.set(420,110,1);
  tail.position.x=-240;
  group.add(tail);

  const angle=Math.random()*Math.PI*2;
  const radius=7200;

  group.position.set(
    Math.cos(angle)*radius,
    (Math.random()-0.5)*2200,
    Math.sin(angle)*radius
  );

  const speed=2.4+Math.random()*1.2;

  group.userData={
    vx:-Math.cos(angle)*speed,
    vz:-Math.sin(angle)*speed,
    life:0,
    pulse:Math.random()*Math.PI*2
  };

  group.rotation.y=angle;

  scene.add(group);
  meteors.push(group);
}

setInterval(spawnMeteor,1500);

// ===== EXPLOSIÓN =====
function createExplosion(position){

  const points=[];

  for(let i=0;i<40;i++){

    const p=new THREE.Mesh(
      new THREE.SphereGeometry(2,8,8),
      new THREE.MeshBasicMaterial({color:0xffd27f})
    );

    p.position.copy(position);

    p.userData={
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      vz:(Math.random()-0.5)*2,
      life:0
    };

    scene.add(p);
    particles.push(p);

    if(i<7) points.push(p);
  }

  const geom=new THREE.BufferGeometry();
  const verts=new Float32Array(points.length*3);

  for(let i=0;i<points.length;i++){
    verts[i*3]=points[i].position.x;
    verts[i*3+1]=points[i].position.y;
    verts[i*3+2]=points[i].position.z;
  }

  geom.setAttribute("position",new THREE.BufferAttribute(verts,3));

  const line=new THREE.Line(
    geom,
    new THREE.LineBasicMaterial({
      color:0xffe7a8,
      transparent:true,
      opacity:0.8
    })
  );

  line.userData={life:0};
  scene.add(line);
  constellations.push(line);
}

// ===== CLICK =====
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function showMeteorMessage(){
  const el=document.getElementById("meteorMsg");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1700);
}

function onClick(e){

  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);

  const heads=meteors.map(m=>m.children[0]);
  const hits=raycaster.intersectObjects(heads);

  if(hits.length>0){

    showMeteorMessage();

    const meteorGroup=hits[0].object.parent;
    createExplosion(meteorGroup.position);

    scene.remove(meteorGroup);
    meteors.splice(meteors.indexOf(meteorGroup),1);
  }
}

window.addEventListener("click",onClick);

// ===== LUZ =====
scene.add(new THREE.AmbientLight(0x777799,1.4));
const sun=new THREE.PointLight(0xffffff,4,15000);
sun.position.set(-3000,1500,-2000);
scene.add(sun);

// ===== HISTORIA =====
const m1=document.getElementById("msg1");
const m2=document.getElementById("msg2");
const m3=document.getElementById("msg3");

function updateStory(){
  const d=camera.position.length();

  m1.classList.toggle("show",d<4500);
  m2.classList.toggle("show",d<2000);
  m3.classList.toggle("show",d<500);

  if(d<1500 && Math.random()<0.1) spawnMeteor();
}

// ===== ANIMACIÓN =====
let t=0;

function animate(){
  requestAnimationFrame(animate);

  t+=0.02;

  const beat=1+Math.sin(t)*0.05;
  planet.scale.set(beat,beat,beat);
  aura.scale.set(1300*beat,1300*beat,1);

  planetGroup.rotation.y+=0.001;
  ring.rotation.z+=0.002;
  words.rotation.y+=0.0003;
  sky.rotation.y+=0.00005;

  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.position.x+=m.userData.vx;
    m.position.z+=m.userData.vz;
    m.userData.life++;

    m.userData.pulse+=0.08;
    const s=1+Math.sin(m.userData.pulse)*0.06;
    m.scale.set(s,s,s);

    if(m.userData.life>6000){
      scene.remove(m);
      meteors.splice(i,1);
    }
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];

    p.position.x+=p.userData.vx;
    p.position.y+=p.userData.vy;
    p.position.z+=p.userData.vz;

    p.userData.life++;
    const s=1-p.userData.life/120;
    p.scale.set(s,s,s);

    if(p.userData.life>120){
      scene.remove(p);
      particles.splice(i,1);
    }
  }

  for(let i=constellations.length-1;i>=0;i--){
    const c=constellations[i];
    c.userData.life++;

    c.material.opacity=0.8*(1-c.userData.life/200);

    if(c.userData.life>200){
      scene.remove(c);
      constellations.splice(i,1);
    }
  }

  updateStory();
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
